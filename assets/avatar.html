<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{margin:0;background:transparent}
  svg{display:block}
</style></head><body>
<svg width="460" height="460" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="35%" stop-color="#4338ca"/>
      <stop offset="70%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (full bleed) -->
  <circle cx="230" cy="230" r="230" fill="url(#bg)"/>

  <!-- Outer subtle ring constellation (thin) -->
  <circle cx="230" cy="230" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="230" cy="230" r="170" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <circle cx="230" cy="230" r="140" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>

  <!-- 5 satellite AI nodes on outer orbit (Claude/GPT/Gemini/Cursor/Antigravity) -->
  <!-- positioned at 270°, 342°, 54°, 126°, 198° for evenly-spaced pentagon -->
  <g filter="url(#glow)">
    <!-- top (12 o'clock) -->
    <circle cx="230" cy="60" r="11" fill="#60a5fa"/>
    <!-- top-right -->
    <circle cx="392" cy="178" r="11" fill="#34d399"/>
    <!-- bottom-right -->
    <circle cx="330" cy="372" r="11" fill="#f472b6"/>
    <!-- bottom-left -->
    <circle cx="130" cy="372" r="11" fill="#fbbf24"/>
    <!-- top-left -->
    <circle cx="68" cy="178" r="11" fill="#a78bfa"/>
  </g>

  <!-- Connecting lines from center to each satellite -->
  <g stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-dasharray="4 4">
    <line x1="230" y1="230" x2="230" y2="60"/>
    <line x1="230" y1="230" x2="392" y2="178"/>
    <line x1="230" y1="230" x2="330" y2="372"/>
    <line x1="230" y1="230" x2="130" y2="372"/>
    <line x1="230" y1="230" x2="68" y2="178"/>
  </g>

  <!-- Central core glow -->
  <circle cx="230" cy="230" r="80" fill="url(#core)" opacity="0.65"/>

  <!-- Stylized N letter — clean modernist serif feel -->
  <g filter="url(#glow)">
    <path d="M 188 178
             L 188 282
             L 207 282
             L 207 218
             L 253 282
             L 272 282
             L 272 178
             L 253 178
             L 253 242
             L 207 178 Z"
          fill="#ffffff"
          stroke="rgba(255,255,255,0.6)"
          stroke-width="1"/>
  </g>

  <!-- Tiny scatter stars for depth -->
  <g fill="#ffffff">
    <circle cx="100" cy="120" r="1.5" opacity="0.6"/>
    <circle cx="370" cy="100" r="1.2" opacity="0.5"/>
    <circle cx="380" cy="280" r="1.3" opacity="0.55"/>
    <circle cx="80" cy="320" r="1.4" opacity="0.5"/>
    <circle cx="200" cy="410" r="1.2" opacity="0.45"/>
    <circle cx="350" cy="50" r="1.0" opacity="0.4"/>
  </g>
</svg>
</body></html>
